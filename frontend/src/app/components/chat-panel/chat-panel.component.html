<div class="chat-panel">
  <div class="chat-panel__heading" id="chat-heading">
    <i class="pi pi-comments"></i>
    <h2>AI Assistant</h2>
  </div>

  <div aria-labelledby="chat-heading" aria-live="polite" class="chat-panel__messages" role="log">
    @for (message of chat.messages(); track $index) {
      <div [class]="['chat-panel__message', 'chat-panel__message--' + message.role]">
        <div
          class="chat-panel__bubble"
          [attr.aria-label]="message.role === 'user' ? 'You' : 'Assistant'"
          [innerHTML]="message.text | markdown"
        ></div>
      </div>

      <div class="chat-panel__surfaces">
        @for (surfaceId of message.surfaceIds ?? []; track surfaceId) {
          @if (chat.surfaces().get(surfaceId); as surface) {
            <div class="chat-panel__message chat-panel__message--assistant">
              <a2ui-surface [id]="surfaceId" [surfaceId]="surfaceId" [surface]="surface" />
            </div>
          }
        }
      </div>
    }
    @if (chat.sending() && !chat.streamingStarted()) {
      <app-chat-loading />
    }
  </div>

  <form
    (ngSubmit)="send()"
    [class.chat-panel__composer--sending]="chat.sending()"
    class="chat-panel__composer"
    novalidate
  >
    <div class="chat-panel__field">
      <input
        [formControl]="promptInput"
        aria-label="Message"
        class="chat-panel__input"
        pInputText
        placeholder="Type a command, e.g. Add John with number 123..."
        type="text"
      />
    </div>
    <button [rounded]="true" icon="pi pi-send" label="Send" pButton type="submit"></button>
  </form>
</div>

<p-confirmDialog />

<app-contact-form-dialog
  [show]="chat.editDialogVisible()"
  [contact]="chat.editingContact() ?? undefined"
  (submit)="chat.onEditSubmit($event)"
  (close)="chat.editDialogVisible.set(false)"
/>
