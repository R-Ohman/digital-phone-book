<p-toast aria-live="polite" position="top-right"></p-toast>

<p-splitter [panelSizes]="[30, 70]">
  <ng-template pTemplate="panel">
    <app-contact-list
      (contactDeleted)="onContactDeleted($event)"
      (contactEdited)="onContactEdited($event)"
    ></app-contact-list>
  </ng-template>
  <ng-template pTemplate="panel">
    <app-chat-panel (refreshRequested)="onChatRefresh()"></app-chat-panel>
  </ng-template>
</p-splitter>
